<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="timeprice">
  <!-- coin / clock face -->
  <circle cx="32" cy="32" r="30" fill="#1c1917"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#f5f5f4" stroke-opacity="0.12" stroke-width="2"/>

  <!-- 12 o'clock tick -->
  <rect x="30.5" y="6" width="3" height="6" rx="1.5" fill="#fbbf24"/>

  <!-- clock hands forming an implicit price tick: hour hand short, minute hand long -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#f5f5f4" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="44" y2="32" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>

  <!-- center pin -->
  <circle cx="32" cy="32" r="2.5" fill="#f5f5f4"/>

  <!-- subtle "$" hint at lower right corner -->
  <text x="44" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#fbbf24">$</text>
</svg>
