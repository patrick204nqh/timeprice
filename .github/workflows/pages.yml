name: Pages

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "data/**"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: site

      # rbwasm extracts a ~26 MB pre-built CRuby tarball into site/rubies/ on
      # first run; caching it skips the download (~1–2 min) on every rebuild.
      - name: Cache rbwasm CRuby tarball
        uses: actions/cache@v5
        with:
          path: site/rubies
          key: rbwasm-rubies-${{ runner.os }}-ruby3.3-${{ hashFiles('site/Gemfile.lock') }}

      # Tailwind standalone CLI binary (~10 MB) downloaded by site/build.sh.
      - name: Cache Tailwind CLI binary
        uses: actions/cache@v5
        with:
          path: site/.bin
          key: tailwindcss-${{ runner.os }}-v3.4.17

      - name: Build timeprice.wasm
        working-directory: site
        run: ./build.sh

      - name: Stage site
        run: |
          mkdir -p dist
          cp -r site/index.html site/src site/public dist/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
