name: Release

# STUB — Phase 5 of PLAN.md (§9.3) will complete this.
#
# TODO (Phase 5):
#   1. Run the full RSpec suite on Ruby 3.2 / 3.3 / 3.4 against the tagged ref.
#   2. `gem build timeprice.gemspec` — assert .gem is < ~5MB.
#   3. Push to RubyGems via OIDC **trusted publishing** (no long-lived
#      API tokens). See https://guides.rubygems.org/trusted-publishing/.
#   4. Create a GitHub Release using the matching CHANGELOG section
#      as the release body (extract by version tag).
#
# Triggered on `v*` tag push so a maintainer's release ritual is just:
#   bump VERSION → update CHANGELOG → commit → `git tag vX.Y.Z` → push --tags.
#
# Until Phase 5 lands this workflow intentionally does nothing on tag push.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    # Stub guard: never runs until a maintainer enables it for Phase 5.
    if: false
    permissions:
      contents: write
      id-token: write # required for RubyGems OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Test
        run: bundle exec rspec

      - name: Build gem
        run: gem build timeprice.gemspec

